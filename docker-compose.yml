services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: puro_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_build:/app/.next
    environment:
      NODE_ENV: development
      # Database — use service name, not localhost
      DATABASE_URL: postgresql://puro:puro_dev_only@postgres:5432/puro_barbershop
      DATABASE_URL_UNPOOLED: postgresql://puro:puro_dev_only@postgres:5432/puro_barbershop
      # Auth
      AUTH_SECRET: dev-secret-change-in-production-0123456789abcdef
      AUTH_URL: http://localhost:3000
      # Email — SMTP transport to Mailpit
      RESEND_API_KEY: dev-placeholder-key
      EMAIL_FROM: "Puro Barbershop <no-reply@purobarbershop.com>"
      EMAIL_REPLY_TO: test@example.com
      EMAIL_TRANSPORT: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      # Cron
      CRON_SECRET: dev-cron-secret-change-in-production-0123456789ab
      # Seed
      SEED_ADMIN_PASSWORD: DevPuroAdmin2026!Secure
      # Public
      NEXT_PUBLIC_SHOP_NAME: Puro Barbershop
      NEXT_PUBLIC_SHOP_ADDRESS: "Бул. Христо Ботев 114, Plovdiv, Bulgaria"
      NEXT_PUBLIC_SHOP_LAT: "42.1354"
      NEXT_PUBLIC_SHOP_LNG: "24.7453"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: puro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: puro
      POSTGRES_PASSWORD: puro_dev_only
      POSTGRES_DB: puro_barbershop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U puro -d puro_barbershop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: puro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: puro_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ALLOW_INSECURE: true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  node_modules:
  next_build:
