name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          DATABASE_URL_UNPOOLED: postgresql://test:test@localhost:5432/test
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: http://localhost:3000
          RESEND_API_KEY: test-key
          EMAIL_FROM: test@test.com
          EMAIL_REPLY_TO: test@test.com
          CRON_SECRET: test-cron-secret
          NEXT_PUBLIC_SHOP_NAME: Puro Barbershop
          NEXT_PUBLIC_SHOP_ADDRESS: Test Address
          NEXT_PUBLIC_SHOP_LAT: "42.1354"
          NEXT_PUBLIC_SHOP_LNG: "24.7453"
